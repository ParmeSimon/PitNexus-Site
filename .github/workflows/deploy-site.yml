name: Deploy site (GitHub Pages)

# Construit le site vitrine (Vite/React) et le publie sur GitHub Pages,
# servi sur le domaine custom pitnexus.com (voir public/CNAME).
#
# Prérequis (une seule fois) :
#   Settings → Pages → Build and deployment → Source = "GitHub Actions".
#   Settings → Pages → Custom domain = pitnexus.com (+ Enforce HTTPS une fois le DNS OK).
# Le fichier public/CNAME embarque déjà le domaine dans le build.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Permissions requises par le déploiement Pages via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
